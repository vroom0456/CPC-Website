<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Photography Club</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 p-6 flex flex-col">
      <h1 class="text-xl font-bold uppercase tracking-widest mb-8">Club Admin</h1>
      <nav class="flex flex-col space-y-4">
        <a href="#" class="flex items-center text-accent font-semibold"><i data-lucide="layout-dashboard" class="mr-3 h-5 w-5"></i> Dashboard</a>
        <a href="#" class="flex items-center text-gray-500 hover:text-black"><i data-lucide="image" class="mr-3 h-5 w-5"></i> Galleries</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <header class="flex justify-between items-center mb-10">
        <h2 class="text-3xl font-serif italic">Event Management</h2>
        <button onclick="document.getElementById('create-modal').classList.remove('hidden')" class="bg-black text-white px-6 py-2 rounded shadow hover:bg-gray-800">
          + New Gallery
        </button>
      </header>

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-6 mb-10">
        <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
          <p class="text-xs uppercase tracking-widest text-gray-500">Total Photos</p>
          <p class="text-4xl font-bold mt-2" id="stat-photos">--</p>
        </div>
      </div>

      <!-- Event List Table -->
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
        <table class="w-full text-left">
          <thead class="bg-gray-50 border-b border-gray-100">
            <tr>
              <th class="p-4 text-xs uppercase tracking-widest text-gray-500">Event Name</th>
              <th class="p-4 text-xs uppercase tracking-widest text-gray-500">Date</th>
              <th class="p-4 text-xs uppercase tracking-widest text-gray-500">Status</th>
              <th class="p-4 text-xs uppercase tracking-widest text-gray-500">Actions</th>
            </tr>
          </thead>
          <tbody id="admin-event-list" class="divide-y divide-gray-100">
            <!-- Injected via JS -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Create Event Modal -->
  <div id="create-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-xl w-full max-w-md">
      <h3 class="text-2xl font-serif italic mb-6">Publish New Event</h3>
      <form id="create-event-form" class="space-y-4">
        <div>
          <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Event Name</label>
          <input type="text" id="event-title" required class="w-full border rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Date</label>
          <input type="date" id="event-date" required class="w-full border rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Google Drive Folder ID</label>
          <input type="text" id="event-folder" required class="w-full border rounded px-3 py-2">
        </div>
        <div class="flex justify-end space-x-4 mt-8">
          <button type="button" onclick="document.getElementById('create-modal').classList.add('hidden')" class="text-gray-500 hover:text-black">Cancel</button>
          <button type="submit" class="bg-black text-white px-6 py-2 rounded">Publish</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
